apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-app
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: app
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
      terminationGracePeriodSeconds: 10
