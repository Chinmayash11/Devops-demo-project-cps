# Grafana configuration for dashboard setup

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      access: proxy
      isDefault: true
    - name: CloudWatch
      type: cloudwatch
      jsonData:
        authType: default
        defaultRegion: us-east-1

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  eks-cluster-monitoring.json: |
    {
      "dashboard": {
        "title": "EKS Cluster Monitoring",
        "panels": [
          {
            "title": "CPU Usage",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)"
              }
            ]
          },
          {
            "title": "Memory Usage",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes) by (pod)"
              }
            ]
          },
          {
            "title": "Network I/O",
            "targets": [
              {
                "expr": "sum(rate(container_network_receive_bytes_total[5m])) by (pod)"
              }
            ]
          },
          {
            "title": "Disk I/O",
            "targets": [
              {
                "expr": "sum(rate(container_fs_usage_bytes[5m])) by (pod)"
              }
            ]
          }
        ]
      }
    }
  
  application-metrics.json: |
    {
      "dashboard": {
        "title": "Application Metrics",
        "panels": [
          {
            "title": "HTTP Requests",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total[5m])) by (method, status_code)"
              }
            ]
          },
          {
            "title": "Request Duration",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, http_request_duration_seconds_bucket)"
              }
            ]
          },
          {
            "title": "Active Requests",
            "targets": [
              {
                "expr": "active_requests"
              }
            ]
          },
          {
            "title": "Application Errors",
            "targets": [
              {
                "expr": "sum(rate(app_errors_total[5m])) by (error_type)"
              }
            ]
          }
        ]
      }
    }
