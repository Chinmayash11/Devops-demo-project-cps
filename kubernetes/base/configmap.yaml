apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production-app
  labels:
    app: production-app
    version: v1
data:
  # Application Configuration
  APP_NAME: "production-app"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  PORT: "5000"
  
  # Feature Flags
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  ENABLE_PROFILING: "false"
  
  # External Services
  REDIS_ENABLED: "true"
  CACHE_TTL: "3600"
  
  # Security
  CORS_ENABLED: "true"
  ALLOWED_ORIGINS: "*"
  
  # Monitoring
  METRICS_PORT: "9090"
  HEALTH_CHECK_INTERVAL: "30s"
