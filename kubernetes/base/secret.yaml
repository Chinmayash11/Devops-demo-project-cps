apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: production-app
  labels:
    app: production-app
type: Opaque
stringData:
  # Database credentials (override with actual values)
  DB_USERNAME: "dbadmin"
  DB_PASSWORD: "SecurePassword123!"
  DB_HOST: "postgres.example.com"
  DB_NAME: "app_db"
  
  # API Keys
  API_KEY: "your-api-key-here"
  
  # JWT Secret
  JWT_SECRET: "your-jwt-secret-here"
