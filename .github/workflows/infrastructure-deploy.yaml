name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.8

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    
    permissions:
      contents: read
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Cleanup Terraform Cache
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        rm -rf .terraform .terraform.lock.hcl
        rm -rf ~/.terraform.d/plugins ~/.terraform.d/registry ~/.terraform.d/plugin-cache
    
    - name: Terraform Init
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform init -upgrade \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}" \
          -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
    
    - name: Terraform Format Check
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform fmt -check -recursive ../../
    
    - name: Terraform Validate
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform validate
    
    - name: Terraform Plan
      id: plan
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform plan -no-color -out=tfplan
        terraform show -no-color tfplan > plan.txt
    
    - name: Show Terraform Plan
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        cat plan.txt
    
    - name: Terraform Apply (Manual Approval Required)
      if: github.event.inputs.action == 'apply'
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform apply -no-color tfplan
    
    - name: Terraform Destroy (Manual Approval Required)
      if: github.event.inputs.action == 'destroy'
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform destroy -auto-approve -no-color
    
    - name: Terraform Output
      if: github.event.inputs.action == 'apply'
      id: output
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        terraform output -json >> $GITHUB_STEP_SUMMARY
