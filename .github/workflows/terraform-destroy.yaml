name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev or prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      confirm_destroy:
        description: 'Type "destroy-{environment}" to confirm destruction'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.8

jobs:
  confirm-destroy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Validate Confirmation
      run: |
        EXPECTED="destroy-${{ github.event.inputs.environment }}"
        ACTUAL="${{ github.event.inputs.confirm_destroy }}"
        
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "❌ Destruction cancelled: Incorrect confirmation string"
          echo "Expected: $EXPECTED"
          echo "Got: $ACTUAL"
          exit 1
        fi
        
        echo "✅ Destruction confirmed for ${{ github.event.inputs.environment }} environment"

  terraform-destroy:
    needs: confirm-destroy
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Cleanup Terraform Cache
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        rm -rf .terraform .terraform.lock.hcl
        rm -rf ~/.terraform.d/plugins ~/.terraform.d/registry ~/.terraform.d/plugin-cache

    - name: Terraform Init
      id: init
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform init -backend=false -upgrade
    - name: Terraform Destroy Plan
      id: destroy_plan
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform plan -destroy -no-color -out=destroy_plan > destroy_plan.txt 2>&1
        cat destroy_plan.txt
    
    - name: Display Destruction Plan
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        cat destroy_plan.txt
    
    - name: Create Workflow Summary
      run: |
        echo "## 🗑️ Terraform Destruction Plan - ${{ github.event.inputs.environment }} Environment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⚠️ **Warning**: This will destroy all resources in the **${{ github.event.inputs.environment }}** environment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cd terraform/environments/${{ github.event.inputs.environment }}
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat destroy_plan.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    
    - name: Request Approval (Manual)
      run: |
        echo "⏸️ Pipeline paused for manual approval"
        echo "Review the destruction plan above and approve to proceed"
    
    - name: Terraform Destroy (Execute)
      id: destroy
      run: |
        cd terraform/environments/${{ github.event.inputs.environment }}
        terraform destroy -auto-approve
      continue-on-error: true
    
    - name: Destruction Result
      if: always()
      run: |
        if [ "${{ steps.destroy.outcome }}" == "success" ]; then
          echo "✅ Terraform destroy completed successfully"
          echo "## ✅ Destruction Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The **${{ github.event.inputs.environment }}** environment has been destroyed." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Terraform destroy failed"
          echo "## ❌ Destruction Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Failed to destroy the **${{ github.event.inputs.environment }}** environment." >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
    
    - name: Notify Slack (Optional)
      if: always()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "Terraform Destroy ${{ steps.destroy.outcome == 'success' && '✅ Success' || '❌ Failed' }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Terraform Destruction Report*\nEnvironment: `${{ github.event.inputs.environment }}`\nStatus: ${{ steps.destroy.outcome == 'success' && '✅ Success' || '❌ Failed' }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      continue-on-error: true
