apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production-app

resources:
- namespace.yaml
- configmap.yaml
- secret.yaml
- rbac.yaml
- deployment.yaml
- service.yaml
- ingress.yaml
- hpa.yaml
- pdb.yaml

# Common labels applied to all resources
commonLabels:
  app: production-app
  managed-by: kustomize

# Common annotations applied to all resources
commonAnnotations:
  version: "1.0.0"
  managed-by: "terraform-and-kustomize"

# Image configuration
images:
- name: production-app-image
  newName: ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com/devops-app
  newTag: latest

# Replicas
replicas:
- name: production-app
  count: 3
