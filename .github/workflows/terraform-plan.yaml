name: Terraform Validate and Plan

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.8

jobs:
  terraform-validate:
    name: Terraform Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: write
      security-events: write

    strategy:
      matrix:
        environment: [dev, prod]
      fail-fast: false

    defaults:
      run:
        shell: bash

    steps:
      # Checkout Repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Cleanup Terraform Cache
        run: |
          cd terraform/environments/${{ matrix.environment }}
          rm -rf .terraform .terraform.lock.hcl
          rm -rf ~/.terraform.d/plugins ~/.terraform.d/registry ~/.terraform.d/plugin-cache

      # Terraform Format Check
      - name: Terraform Format Check
        id: fmt
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      # Terraform Init
      - name: Terraform Init
        id: init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false -upgrade

      # Terraform Validate
      - name: Terraform Validate
        id: validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

      # Terraform Plan
      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -no-color -out=tfplan | tee plan.txt

      # Upload Terraform Plan Artifact
      - name: Upload Terraform Plan
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}/plan.txt

      # TFSec Security Scan
      - name: Run TFSec Scan
        uses: aquasecurity/tfsec-action@master
        with:
          working_directory: terraform
        continue-on-error: true

      # Workflow Summary
      - name: Terraform Summary
        if: always()
        run: |
          echo "Terraform validation completed for environment: ${{ matrix.environment }}"
          echo "Format Check Status: ${{ steps.fmt.outcome }}"
          echo "Init Status: ${{ steps.init.outcome }}"
          echo "Validate Status: ${{ steps.validate.outcome }}"
