name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to destroy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      confirm_destroy:
        description: Type destroy-dev or destroy-prod to confirm destruction
        required: true
        type: string
      state_artifact_run_id:
        description: Optional deploy workflow run ID containing terraform-state-{environment}
        required: false
        type: string

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.8

jobs:
  terraform-destroy:
    name: Destroy Terraform (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}

    permissions:
      actions: read
      contents: read
      id-token: write

    concurrency:
      group: terraform-destroy-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    defaults:
      run:
        shell: bash

    steps:
      - name: Validate confirmation
        run: |
          expected="destroy-${{ github.event.inputs.environment }}"
          actual="${{ github.event.inputs.confirm_destroy }}"

          if [ "$actual" != "$expected" ]; then
            echo "Destroy cancelled: confirmation must be '$expected'."
            exit 1
          fi

          echo "Destroy confirmed for ${{ github.event.inputs.environment }}."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore local Terraform state artifact
        if: github.event.inputs.state_artifact_run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_dir="terraform/environments/${{ github.event.inputs.environment }}"
          artifact_name="terraform-state-${{ github.event.inputs.environment }}"

          gh run download "${{ github.event.inputs.state_artifact_run_id }}" \
            --name "$artifact_name" \
            --dir "$target_dir"

          ls -la "$target_dir"

      - name: Warn when no local state was restored
        if: github.event.inputs.state_artifact_run_id == ''
        run: |
          echo "No state artifact run ID was provided."
          echo "With local state, Terraform can only destroy resources that are present in terraform.tfstate on this runner."
          echo "Use the deploy run ID that uploaded terraform-state-${{ github.event.inputs.environment }} if you need to restore state."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Clean Terraform cache
        run: |
          cd terraform/environments/${{ github.event.inputs.environment }}
          rm -rf .terraform .terraform.lock.hcl
          rm -rf ~/.terraform.d/plugins ~/.terraform.d/registry ~/.terraform.d/plugin-cache

      - name: Terraform init
        run: |
          cd terraform/environments/${{ github.event.inputs.environment }}
          terraform init -upgrade

      - name: Terraform validate
        run: |
          cd terraform/environments/${{ github.event.inputs.environment }}
          terraform validate

      - name: Terraform destroy plan
        run: |
          cd terraform/environments/${{ github.event.inputs.environment }}
          terraform plan -destroy -no-color -lock-timeout=5m -out=destroy.tfplan | tee destroy-plan.txt

      - name: Upload destroy plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-destroy-plan-${{ github.event.inputs.environment }}
          path: terraform/environments/${{ github.event.inputs.environment }}/destroy-plan.txt

      - name: Add destroy summary
        run: |
          cd terraform/environments/${{ github.event.inputs.environment }}
          echo "## Terraform Destroy - ${{ github.event.inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Review the destroy plan carefully. This workflow will apply it automatically after this step." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat destroy-plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform destroy
        run: |
          cd terraform/environments/${{ github.event.inputs.environment }}
          terraform apply -destroy -no-color -auto-approve destroy.tfplan

      - name: Upload local Terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-after-destroy-${{ github.event.inputs.environment }}
          path: |
            terraform/environments/${{ github.event.inputs.environment }}/terraform.tfstate
            terraform/environments/${{ github.event.inputs.environment }}/terraform.tfstate.backup
          if-no-files-found: ignore
