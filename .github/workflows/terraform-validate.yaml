name: Terraform Validate and Plan

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    
    strategy:
      matrix:
        environment: [dev, prod]
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false
    
    - name: Terraform Format Check
      id: fmt
      run: |
        cd terraform/environments/${{ matrix.environment }}
        terraform fmt -check -recursive ../../
      continue-on-error: true
    
    - name: Terraform Init
      id: init
      run: |
        cd terraform/environments/${{ matrix.environment }}
        terraform init -backend=false
    
    - name: Terraform Validate
      id: validate
      run: |
        cd terraform/environments/${{ matrix.environment }}
        terraform validate
    
    - name: Terraform Plan (for PR)
      if: github.event_name == 'pull_request'
      id: plan
      run: |
        cd terraform/environments/${{ matrix.environment }}
        terraform plan -no-color -out=tfplan > plan.txt 2>&1
        cat plan.txt
      continue-on-error: true
    
    - name: Add Plan Comment to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const planFile = 'terraform/environments/${{ matrix.environment }}/plan.txt';
          const plan = fs.readFileSync(planFile, 'utf8');
          const maxChars = 65536;
          const comment = `## Terraform Plan - ${{ matrix.environment }} Environment

          \`\`\`
          ${plan.substring(0, maxChars)}
          \`\`\``;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
    
    - name: Check Terraform Format
      if: steps.fmt.outcome == 'failure'
      run: |
        echo "Terraform format check failed. Please run: terraform fmt -recursive"
        exit 1
    
    - name: Terraform Security Scan (TFSec)
      uses: aquasecurity/tfsec-action@master
      with:
        working_directory: terraform
      continue-on-error: true
