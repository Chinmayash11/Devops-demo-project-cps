apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production-app-prod

bases:
- ../../base

namePrefix: prod-

commonLabels:
  environment: prod

# Keep replicas as in base (3)
replicas:
- name: production-app
  count: 3

# Resource limits for prod (higher than dev)
patchesStrategicMerge:
- deployment-patch.yaml

# ConfigMap patches for prod
configMapGenerator:
- name: app-config
  behavior: merge
  literals:
  - ENVIRONMENT=prod
  - LOG_LEVEL=WARN
  - ENABLE_PROFILING=false
